<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ไม่พบหน้าที่ค้นหา (404) — บริษัท คริสตัล ควาเลท จำกัด</title>
  <meta name="description" content="ไม่พบหน้าที่คุณค้นหา กลับสู่หน้าแรกของบริษัท คริสตัล ควาเลท จำกัด" />
  <meta name="robots" content="noindex, follow" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#111827" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon-180.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .error-page { min-height: 100vh; display: grid; place-items: center; text-align: center;
      padding: var(--gutter);
      background: var(--surface); }
    .error-code { font-family: var(--font-body); font-size: clamp(5rem, 18vw, 11rem); line-height: 1;
      font-weight: 700; color: var(--brand-600); }
    .error-page p { color: var(--muted); max-width: 46ch; margin: 14px auto 28px; }
    .error-page .eyebrow { justify-content: center; }
  </style>
</head>
<body>
  <main class="error-page" id="home">
    <div>
      <p class="eyebrow">Error 404</p>
      <h1 class="error-code">404</h1>
      <h2>ไม่พบหน้าที่คุณค้นหา</h2>
      <p>ขออภัย หน้าที่คุณกำลังมองหาอาจถูกย้าย ลบ หรือไม่เคยมีอยู่ — ลองกลับไปที่หน้าแรกของเราได้เลย</p>
      <a href="/" class="btn btn--lg">
        กลับสู่หน้าแรก
        <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    </div>
  </main>
</body>
</html>
